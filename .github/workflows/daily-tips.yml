name: Daily Tips Refresh

on:
  schedule:
    - cron: '0 22 * * *'  # 6:00 AM PHT (UTC+8) = 10:00 PM UTC
  workflow_dispatch:        # pwede ring i-trigger manually sa GitHub

jobs:
  refresh-tips:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow the default GITHUB_TOKEN to push the refreshed cache

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate location tips
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run generate-tips

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/locationTipsCache.json src/data/locationPredictionsCache.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated tips
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Tipid Tips Bot"
          git config user.email "bot@tipidtips.ph"
          git add src/data/locationTipsCache.json src/data/locationPredictionsCache.json
          # No [skip ci]: a GITHUB_TOKEN push can't trigger GitHub Actions anyway,
          # and we want Vercel to pick up this push and redeploy with the fresh tips.
          git commit -m "chore: refresh daily location tips + predictions"
          git push
